version: '3.8'

services:
  spanner-mcp-server:
    build: .
    container_name: spanner-mcp-server
    environment:
      - GOOGLE_CLOUD_PROJECT_ID=${GOOGLE_CLOUD_PROJECT_ID}
      - SPANNER_INSTANCE_ID=${SPANNER_INSTANCE_ID}
      - SPANNER_DATABASE_ID=${SPANNER_DATABASE_ID}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MAX_QUERY_TIME=${MAX_QUERY_TIME:-30000}
      - MAX_RESULTS=${MAX_RESULTS:-1000}
      - ENABLE_LOGGING=${ENABLE_LOGGING:-true}
      - CACHE_SCHEMA_FOR=${CACHE_SCHEMA_FOR:-3600000}
    volumes:
      - ./logs:/app/logs
      - ${GOOGLE_APPLICATION_CREDENTIALS}:${GOOGLE_APPLICATION_CREDENTIALS}:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('Health check passed')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - spanner-mcp-network

  # Optional: Add a monitoring service
  prometheus:
    image: prom/prometheus:latest
    container_name: spanner-mcp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - spanner-mcp-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: spanner-mcp-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - spanner-mcp-network
    profiles:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  spanner-mcp-network:
    driver: bridge 